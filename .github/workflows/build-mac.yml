name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖库
        run: |
          pip install pycryptodome ttkbootstrap pyinstaller

      - name: 打包成 Mac App
        run: pyinstaller --onefile --windowed --collect-data ttkbootstrap your_will.py

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: YourWill_Mac
          path: dist/your_will.app
